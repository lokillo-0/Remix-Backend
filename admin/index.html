<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=5.1">
</head>

<body>

    <nav class="sidebar">
        <div class="brand">
            <img src="logo.png" alt="Remix Logo" class="r-logo">
        </div>

        <ul class="nav-links">
            <li class="active" data-tab="storefront-panel">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"
                        fill="currentColor" />
                </svg>
                Shop
            </li>
            <li data-tab="manage-panel">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"
                        fill="currentColor" />
                </svg>
                Accounts
            </li>
        </ul>
    </nav>

    <main class="content-area">
        <header class="main-header">
            <h2 id="page-title">Shop</h2>
            <button id="logout-btn" class="btn outline">Log out</button>
        </header>

        <div class="panels-container">
            <div id="economy-panel" class="panel">
                <form id="vbucks-form" class="launcher-form">
                    <div class="input-group">
                        <label>Account ID or Username</label>
                        <input type="text" id="vbucks-account" placeholder="Display Name or ID" required
                            autocomplete="off">
                    </div>
                    <div class="input-group">
                        <label>Amount</label>
                        <input type="number" id="vbucks-amount" value="13500" required>
                    </div>
                    <div class="button-group">
                        <button type="submit" class="btn primary">Give V-Bucks</button>
                    </div>
                </form>
            </div>
            <div id="storefront-panel" class="panel active">
                <div class="shop-editor-card">
                    <div class="shop-editor-header">
                        <div>
                            <h3 class="shop-editor-title">Shop JSON Editor</h3>
                            <p class="shop-editor-subtitle">Edit assets/shop.json, then save your changes.</p>
                        </div>
                        <div class="shop-editor-actions">
                            <button id="btn-shop-reload" class="btn outline" type="button">Reload</button>
                            <button id="btn-shop-save" class="btn primary" type="button" disabled>Save</button>
                        </div>
                    </div>
                    <textarea id="shop-json-editor" class="shop-json-editor" spellcheck="false" autocomplete="off" placeholder="Loading assets/shop.json..."></textarea>
                    <p id="shop-editor-status" class="shop-editor-status">Loading assets/shop.json...</p>
                </div>
            </div>
            <div id="manage-panel" class="panel">
                <div class="accounts-list-header">
                    <h3>Registered Accounts</h3>
                    <div class="accounts-header-right">
                        <div class="search-bar">
                            <svg viewBox="0 0 24 24" class="search-icon"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/></svg>
                            <input type="text" id="accounts-search" placeholder="Search by name, email or ID...">
                        </div>
                        <button class="btn outline" id="btn-refresh-accounts" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Refresh</button>
                    </div>
                </div>

                <div class="accounts-list-container">
                    <div class="accounts-list-labels">
                        <span class="label-name">DISPLAY NAME / ID</span>
                        <span class="label-email">EMAIL ADDRESS</span>
                        <span class="label-actions">ACTIONS</span>
                    </div>

                    <div id="accounts-render-target"></div>
                </div>

                                <div id="manage-editor-template" style="display: none;">
                    <div class="launcher-form list-editor" style="margin-top: 0.5rem; margin-bottom: 1rem; border: 1px solid var(--border-subtle); background: var(--bg-main);">
                        <div class="editor-fields">
                            <div class="input-group">
                                <label>Username</label>
                                <input type="text" class="manage-new-name" autocomplete="off">
                            </div>
                            <div class="input-group">
                                <label>Email</label>
                                <input type="email" class="manage-new-email" autocomplete="off">
                            </div>
                            <div class="input-group">
                                <label>Password</label>
                                <input type="text" class="manage-new-pass" autocomplete="off">
                            </div>
                            <div class="input-group">
                                <label>V-Bucks Amount</label>
                                <input type="number" class="manage-vbucks-amount" value="1000" autocomplete="off">
                            </div>
                            <div class="input-group">
                                <label>Template ID</label>
                                <input type="text" class="manage-item-template" placeholder="AthenaCharacter:CID_..." autocomplete="off">
                            </div>
                        </div>
                        <div class="button-group">
                            <button type="button" class="btn primary btn-update-name">Save Username</button>
                            <button type="button" class="btn primary btn-update-email">Save Email</button>
                            <button type="button" class="btn primary btn-update-pass">Save Password</button>
                            <button type="button" class="btn primary btn-give-vbucks">Give V-Bucks</button>
                            <button type="button" class="btn primary btn-give-item">Give Item</button>
                            <button type="button" class="btn primary btn-grant-locker">Give Full Locker</button>
                            <button type="button" class="btn outline btn-revoke-locker">Remove Full Locker</button>
                            <button type="button" class="btn outline btn-remove-battlepass">Remove Battle Pass</button>
                            <button type="button" class="btn danger btn-wipe-items" onclick="wipeAllItems(this)">Wipe All Items</button>
                            <button type="button" class="btn danger btn-ban-account">Ban Account (Perm)</button>
                            <button type="button" class="btn danger btn-delete-account">Delete Account</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="script.js?v=8.3"></script>
</body>

</html>
